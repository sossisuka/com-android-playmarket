name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag for the release, for example v1.0.0"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
            RELEASE_NAME="${{ inputs.release_name }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME=""
            PRERELEASE="false"
          fi

          if [ -z "${RELEASE_NAME}" ]; then
            RELEASE_NAME="${TAG_NAME}"
          fi

          {
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${RELEASE_NAME}"
            echo "prerelease=${PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git fetch --tags origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          else
            git tag "${TAG_NAME}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Create CI .env
        shell: bash
        env:
          PLAY_API_BASE_URL: ${{ vars.PLAY_API_BASE_URL }}
          PLAY_API_BASE_URL_SECRET: ${{ secrets.PLAY_API_BASE_URL }}
        run: |
          API_URL="${PLAY_API_BASE_URL}"
          if [ -z "${API_URL}" ]; then
            API_URL="${PLAY_API_BASE_URL_SECRET}"
          fi
          if [ -z "${API_URL}" ]; then
            API_URL="http://10.0.2.2:8787"
          fi

          printf "PLAY_API_BASE_URL=%s\n" "${API_URL}" > .env

      - name: Build debug APK
        shell: bash
        run: ./gradlew :app:assembleDebug

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.android.playmarket-${{ steps.meta.outputs.tag_name }}
          path: app/build/outputs/apk/debug/com.android.playmarket.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/com.android.playmarket.apk
