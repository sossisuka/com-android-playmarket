name: Android Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-latest
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set release metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          {
            echo "tag_name=latest"
            echo "release_name=Latest APK build"
            echo "short_sha=${SHORT_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Move latest tag to current commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.meta.outputs.tag_name }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.meta.outputs.tag_name }}" --force

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Prepare .env
        shell: bash
        env:
          PLAY_API_BASE_URL: ${{ vars.PLAY_API_BASE_URL }}
          PLAY_API_BASE_URL_SECRET: ${{ secrets.PLAY_API_BASE_URL }}
        run: |
          if [ -f .env ]; then
            echo "Using tracked .env from repository"
            exit 0
          fi

          API_URL="${PLAY_API_BASE_URL}"
          if [ -z "${API_URL}" ]; then
            API_URL="${PLAY_API_BASE_URL_SECRET}"
          fi
          if [ -z "${API_URL}" ]; then
            API_URL="http://10.0.2.2:8787"
          fi

          printf "PLAY_API_BASE_URL=%s\n" "${API_URL}" > .env

      - name: Make Gradle wrapper executable
        shell: bash
        run: chmod +x ./gradlew

      - name: Build debug APK
        shell: bash
        run: ./gradlew :app:assembleDebug

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: com.android.playmarket-${{ github.ref_name }}-${{ steps.meta.outputs.short_sha }}
          path: app/build/outputs/apk/debug/com.android.playmarket.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: true
          generate_release_notes: false
          make_latest: false
          overwrite_files: true
          body: |
            Automatic APK build from `${{ github.ref_name }}`.

            Commit: `${{ github.sha }}`
          files: app/build/outputs/apk/debug/com.android.playmarket.apk
